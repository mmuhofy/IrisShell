# Detekt configuration — Iris Shell
# Reference: https://detekt.dev/docs/reference/configuration/
#
# Tuned to align with ktlint rules enforced by Spotless at the root project.
# Convention plugins inherit these rules automatically — modules do NOT
# need to declare their own detekt block.

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false
  excludes: []

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 7
    constructorThreshold: 8
  LongMethod:
    active: true
    threshold: 80
  ComplexCondition:
    active: true
    threshold: 5
  ComplexInterface:
    active: true
    threshold: 12
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  LargeClass:
    active: true
    threshold: 250
  NestedBlockDepth:
    active: true
    threshold: 5

style:
  active: true
  ReturnCount:
    active: false
  WildcardImport:
    active: false # disabled in ktlint too — we use explicit imports manually
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][a-z0-9]*)*'

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowCommentedList: false # an empty catch block MUST be justified
  EmptyFunctionBlock:
    active: true
    allowEmptyFunctionWithSuppress: true

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true

exceptions:
  active: true
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: false # Iris uses sealed classes for error types; generic catch guarded by AGENT.md §191
