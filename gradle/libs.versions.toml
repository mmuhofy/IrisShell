# Iris Shell — Version Catalog
# Single source of truth for all dependency versions.
#
# Memory Bank stack reference (§3):
#   - Kotlin 2.3.20
#   - Compose BOM 2026.04.01
#   - Hilt 2.57
#   - Room 2.8.4
#   - SSHJ 0.38.x
#   - Min SDK 26 / Target SDK 36 / Compile SDK 36
#
# NOTE: KSP version MUST match Kotlin 2.3.20 — use KSP 2.3.20-x.x.x.

[versions]
# Build tools
agp = "8.13.0"
