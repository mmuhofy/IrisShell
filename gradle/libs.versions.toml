androidxDataStore = "1.1.7"
androidxSecurityCrypto = "1.1.0-alpha06"
androidxBiometric = "1.2.0-alpha05"
androidxWorkManager = "2.11.2"
androidxNavigation = "2.9.5"

# Compose
composeBom = "2026.04.01"
composeMaterial3 = "1.4.0-alpha02"
composeMaterialIcons = "1.7.8"

# DI
hilt = "2.57"
hiltNavigationCompose = "1.3.0"
hiltWork = "1.2.0"

# Coroutines
coroutines = "1.10.2"

# Serialization
kotlinxSerialization = "1.7.3"

# Room
room = "2.8.4"

# Networking
okhttp = "4.12.0"

# SSH
