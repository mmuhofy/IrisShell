# Iris Shell signing configuration (do not commit real secrets to git)
#
# This file is gitignored. The debug.keystore in app/keystore/ is checked into
# git because IrisShell is a single-developer project and we want every CI
# runner to sign with the same key — otherwise installing a CI build over a
# locally-built debug APK triggers Android's "INSTALL_FAILED_UPDATE_INCOMPATIBLE"
# because the signing certificates differ.
#
# When you provision a real release keystore, place its password in
# KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD below and reference a separate
# release.keystore file. Keep both this file and app/keystore/release.keystore
# out of version control.
storeFile=keystore/debug.keystore
storePassword=android
keyAlias=androiddebugkey
keyPassword=android
